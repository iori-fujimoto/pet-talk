<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぱーそなる - つくってるよ…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-1:        #f2e7db;
      --bg-2:        #e4d0bd;
      --paper:       #fffaf3;
      --paper-2:     #f6ecde;
      --ink:         #3d342e;
      --ink-soft:    #857569;
      --muted:       #b9a99b;
      --line:        #ece1d2;
      --accent:      #b8755f;
      --accent-deep: #8a5646;
      --accent-soft: #e3b8a5;
      --sage:        #9fb08f;
    }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro',
                   'Yu Gothic', 'YuGothic', 'Segoe UI', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, #fff1e0 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 110%, #e6ccb5 0%, transparent 55%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'palt';
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--paper);
      border-radius: 32px;
      box-shadow:
        0 1px 0 rgba(255,255,255,.8) inset,
        0 24px 60px rgba(96, 62, 40, .18),
        0 6px 14px rgba(96, 62, 40, .08);
      border: 1px solid rgba(255,255,255,.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 96vh;
      max-height: 880px;
      padding: 40px 28px;
      text-align: center;
    }

    /* ─── Loading state ─── */
    .loading-text {
      font-family: 'Zen Old Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      font-size: 17px;
      color: var(--ink);
      font-weight: 500;
      letter-spacing: .04em;
      margin-bottom: 32px;
    }

    .scanline-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 50%, #fff7ec 0%, var(--paper-2) 100%);
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 4px 14px rgba(96,62,40,.08);
      border: 1px solid rgba(255,255,255,.6);
    }
    .scanline-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(227,184,165,.18) 0%, transparent 65%);
      animation: glow-pulse 2.4s ease-in-out infinite;
    }
    .scanline-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(184,117,95,.4), transparent);
      animation: scanline 2.2s ease-in-out infinite;
    }
    @keyframes scanline {
      0%, 100% { top: 8%; }
      50%      { top: 92%; }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: .5; }
      50%      { opacity: 1; }
    }

    /* ─── Progress steps ─── */
    .progress-steps {
      list-style: none;
      text-align: left;
      width: 100%;
      max-width: 280px;
    }
    .progress-steps li {
      font-size: 14px;
      color: var(--muted);
      padding: 7px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color .3s;
      letter-spacing: .04em;
    }
    .progress-steps li.active {
      color: var(--accent);
      font-weight: 500;
    }
    .progress-steps li.done {
      color: var(--sage);
    }
    .step-icon {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-family: 'Zen Old Mincho', serif;
    }
    .step-icon.spinner {
      animation: spin 1.2s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── Reveal state ─── */
    .reveal-area {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .reveal-area.show { display: flex; }
    .reveal-img {
      width: 280px;
      height: 280px;
      object-fit: contain;
      animation: reveal-pop .7s cubic-bezier(.175, .885, .32, 1.275);
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 18px rgba(96, 62, 40, .12));
    }
    @keyframes reveal-pop {
      0%   { transform: scale(.3); opacity: 0; }
      100% { transform: scale(1);  opacity: 1; }
    }
    .reveal-name {
      font-family: 'Zen Old Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 10px;
      letter-spacing: .06em;
    }
    .reveal-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 26px;
    }
    .reveal-tag {
      background: var(--paper-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 5px 13px;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: .04em;
    }
    .reveal-hint {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .06em;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: .4; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Loading phase -->
  <div id="loadingPhase">
    <div class="scanline-wrap"></div>
    <div id="loadingText" class="loading-text"></div>
    <ul class="progress-steps">
      <li id="step1"><span class="step-icon">○</span>キャラ選定中</li>
      <li id="step2"><span class="step-icon">○</span>おようふく準備中</li>
      <li id="step3"><span class="step-icon">○</span>仕上げ中</li>
    </ul>
  </div>

  <!-- Reveal phase -->
  <div id="revealPhase" class="reveal-area">
    <img id="revealImg" class="reveal-img" src="" alt="">
    <div id="revealName" class="reveal-name"></div>
    <div id="revealTags" class="reveal-tags"></div>
    <div class="reveal-hint">タップして会話をはじめる</div>
  </div>
</div>

<script>
// ─── Pre-generated image sets per charType ───────────
const IMAGE_SETS = {
  dog: {
    happy:   'public/images/generated_1_happy.png',
    talking: 'public/images/generated_1_talking.png',
  },
  usagi: {
    happy:   'public/images/usagi_happy.png',
    talking: 'public/images/usagi_talking.png',
  },
};

const CHAR_TYPE_LABEL = {
  usagi: 'うさぎ', dog: 'いぬ', cat: 'ねこ', mouse: 'ねずみ',
};
const COLOR_LABEL = {
  normal: 'ノーマル', sakura: 'さくらいろ', sora: 'そらいろ',
  mori: 'もりいろ', night: 'よるいろ', candy: 'あめいろ',
  yuki: 'しろゆき', kin: 'おうごん', aurora: 'オーロラ',
};
const RARITY_LABEL = {
  normal: '★ ノーマル', rare: '★★ レア',
  super: '★★★ スーパーレア', legend: '★★★★ レジェンド',
};

// ─── Step UI helpers ─────────────────────────────────
function setStep(stepId, state) {
  const el = document.getElementById(stepId);
  const icon = el.querySelector('.step-icon');
  el.classList.remove('active', 'done');
  if (state === 'active') {
    el.classList.add('active');
    icon.textContent = '◎';
    icon.classList.add('spinner');
  } else if (state === 'done') {
    el.classList.add('done');
    icon.textContent = '✓';
    icon.classList.remove('spinner');
  }
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ─── Main flow ───────────────────────────────────────
async function main() {
  const variantStr = localStorage.getItem('personal-variant');
  if (!variantStr) {
    window.location.href = 'gacha-mock.html';
    return;
  }

  const variant = JSON.parse(variantStr);

  document.getElementById('loadingText').textContent =
    `「${variant.name}ちゃんをつくってるよ…」`;

  // Pick image set based on charType
  const imageSet = IMAGE_SETS[variant.charType] || IMAGE_SETS.dog;

  // Fake generation steps for fun
  setStep('step1', 'active');
  await sleep(800 + Math.random() * 400);
  setStep('step1', 'done');

  setStep('step2', 'active');
  await sleep(600 + Math.random() * 400);
  setStep('step2', 'done');

  setStep('step3', 'active');
  await sleep(500 + Math.random() * 300);
  setStep('step3', 'done');

  await sleep(400);

  // ─── Reveal the character ───────────────────────
  document.getElementById('loadingPhase').style.display = 'none';

  const $reveal     = document.getElementById('revealPhase');
  const $revealImg  = document.getElementById('revealImg');
  const $revealName = document.getElementById('revealName');
  const $revealTags = document.getElementById('revealTags');

  $revealImg.src = imageSet.happy;
  $revealImg.alt = variant.name;
  $revealName.textContent = variant.name;

  const tags = [
    CHAR_TYPE_LABEL[variant.charType] || variant.charType,
    COLOR_LABEL[variant.colorId] || variant.colorId,
    variant.personality,
    RARITY_LABEL[variant.rarity] || variant.rarity,
  ];
  tags.forEach(t => {
    const el = document.createElement('span');
    el.className = 'reveal-tag';
    el.textContent = t;
    $revealTags.appendChild(el);
  });

  $reveal.classList.add('show');

  // Tap anywhere to go to chat
  document.addEventListener('click', () => {
    window.location.href = 'index.html';
  }, { once: true });
}

main();
</script>
</body>
</html>
