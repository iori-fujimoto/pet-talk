<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぱーそなる</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-1:        #f2e7db;
      --bg-2:        #e4d0bd;
      --paper:       #fffaf3;
      --paper-2:     #f6ecde;
      --ink:         #3d342e;
      --ink-soft:    #857569;
      --muted:       #b9a99b;
      --line:        #ece1d2;
      --accent:      #b8755f;
      --accent-deep: #8a5646;
      --accent-soft: #e3b8a5;
    }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro',
                   'Yu Gothic', 'YuGothic', 'Segoe UI', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, #fff1e0 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 110%, #e6ccb5 0%, transparent 55%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'palt';
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--paper);
      border-radius: 32px;
      box-shadow:
        0 1px 0 rgba(255,255,255,.8) inset,
        0 24px 60px rgba(96, 62, 40, .18),
        0 6px 14px rgba(96, 62, 40, .08);
      border: 1px solid rgba(255,255,255,.55);
      padding: 48px 32px 40px;
      text-align: center;
      position: relative;
    }
    .ornament {
      display: block;
      margin: 0 auto 18px;
      width: 30px;
      height: 30px;
      color: var(--accent-soft);
    }

    h1 {
      font-family: 'Zen Old Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      font-size: 30px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: .12em;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 32px;
      letter-spacing: .06em;
      line-height: 1.6;
    }

    .key-field {
      text-align: left;
      margin-bottom: 22px;
    }
    .key-field.hidden { display: none; }
    .key-label {
      font-family: 'Zen Old Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      display: block;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: .24em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .key-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      background: var(--paper-2);
      color: var(--ink);
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .key-field input:focus {
      border-color: var(--accent-soft);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(184,117,95,.08);
    }
    .key-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.6;
      letter-spacing: .03em;
    }
    .key-hint a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent-soft); }

    .btn-start {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fffaf3;
      border: none;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .12em;
      font-family: inherit;
      box-shadow: 0 6px 16px rgba(184,117,95,.28);
      transition: transform .15s, background .25s, box-shadow .25s;
    }
    .btn-start:hover  { background: var(--accent-deep); transform: translateY(-1px); }
    .btn-start:active { transform: scale(0.98); }
    .btn-start:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }
  </style>
</head>
<body>

<div class="container">
  <svg class="ornament" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 4c0 3.5 2.5 6 6 6-3.5 0-6 2.5-6 6 0-3.5-2.5-6-6-6 3.5 0 6-2.5 6-6z"/>
  </svg>
  <h1>ぱーそなる</h1>
  <p class="subtitle">あなただけのコと、であう</p>

  <div id="keyField" class="key-field">
    <label class="key-label" for="keyInput">Gemini API キー</label>
    <input type="password" id="keyInput" placeholder="AIza…" autocomplete="off" spellcheck="false">
    <p class="key-hint">さいしょの一回だけ教えてね。この端末にだけ保存されます。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">AI Studio でキーをつくる</a>
    </p>
  </div>

  <button id="startBtn" class="btn-start">はじめる</button>
</div>

<script>
// ─── Gacha Data (dog & usagi only) ──────────────────
const CHAR_TYPES = [
  { id: 'dog',   label: 'いぬ' },
  { id: 'usagi', label: 'うさぎ' },
];

const COLORS = [
  { id: 'normal', rarity: 'normal', weight: 30 },
  { id: 'sakura', rarity: 'normal', weight: 20 },
  { id: 'sora',   rarity: 'normal', weight: 20 },
  { id: 'mori',   rarity: 'rare',   weight: 12 },
  { id: 'night',  rarity: 'rare',   weight: 8 },
  { id: 'candy',  rarity: 'rare',   weight: 5 },
  { id: 'yuki',   rarity: 'super',  weight: 3 },
  { id: 'kin',    rarity: 'legend', weight: 1.5 },
  { id: 'aurora', rarity: 'legend', weight: 0.5 },
];

const NAMES = {
  dog:   ['ブル', 'ごん太', 'ドス', 'がぶ', 'ボス', 'もぐ', 'ぶん'],
  usagi: ['ウサ', 'ぴょんた', 'モフ', 'みみ', 'ゆき', 'もち', 'ぽぽ'],
};

const PERSONALITIES = {
  dog:   ['おとこまえ', 'のんびりや', 'くいしんぼ', 'がんこもの', 'あまえんぼ', 'いたずらっこ'],
  usagi: ['あまえんぼ', 'おっとり', 'てれや', 'さびしがり', 'くいしんぼ', 'がんばりや'],
};

function weightedPick(items) {
  const total = items.reduce((s, c) => s + c.weight, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.weight;
    if (r <= 0) return item;
  }
  return items[items.length - 1];
}

function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function rollGacha() {
  const charType = randomPick(CHAR_TYPES);
  const color = weightedPick(COLORS);
  const name = randomPick(NAMES[charType.id]);
  const personality = randomPick(PERSONALITIES[charType.id]);

  return {
    charType:    charType.id,
    colorId:     color.id,
    animId:      'none',
    name:        name,
    personality: personality,
    rarity:      color.rarity,
  };
}

// ─── Start ───────────────────────────────────────────
const $keyField = document.getElementById('keyField');
const $keyInput = document.getElementById('keyInput');
const $startBtn = document.getElementById('startBtn');

// If a key is already saved on this device, skip the input
if (localStorage.getItem('pet-talk-gemini-key')) {
  $keyField.classList.add('hidden');
}

function start() {
  // Require a key on first run
  let key = localStorage.getItem('pet-talk-gemini-key');
  if (!key) {
    key = $keyInput.value.trim();
    if (!key) {
      $keyInput.focus();
      $keyInput.style.borderColor = 'var(--accent)';
      return;
    }
    localStorage.setItem('pet-talk-gemini-key', key);
  }

  $startBtn.disabled = true;
  const variant = rollGacha();
  localStorage.setItem('personal-variant', JSON.stringify(variant));
  window.location.href = 'generate.html';
}

$startBtn.onclick = start;
$keyInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') start();
});
</script>
</body>
</html>
